<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poby — Screen 4 · 갤러리</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{ color-scheme: light; }
  html,body{ margin:0; padding:0; background:#e6e4dc; font-family:'Pretendard',-apple-system,system-ui,sans-serif; color:#1a1a1c; }
  *{ box-sizing:border-box; }
  @keyframes pobySpin { to { transform: rotate(360deg); } }
  @keyframes pobyPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.0); transform: scale(1); }
    50% { box-shadow: 0 0 0 6px rgba(255,255,255,.10); transform: scale(1.03); }
  }
  .dc-card ::-webkit-scrollbar{ display: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hifi-screens.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, PW, PH, S4Gallery } = window;

function App() {
  return (
    <DesignCanvas
      title="Poby — Screen 4 · 갤러리"
      subtitle="Screen 1의 '+' → '가이드 사진 등록하기'로 진입. 단일 선택, 1장 선택 시에만 완료 활성."
    >
      <DCSection id="s4" title="s4 · 갤러리">
        <DCArtboard id="s4-none" label="A · 사진 미선택 (완료 비활성)" width={PW} height={PH}>
          <S4Gallery />
        </DCArtboard>
        <DCArtboard id="s4-pick" label="B · 사진 1장 선택 (완료 활성)" width={PW} height={PH}>
          <S4Gallery selectedIdx={4} />
        </DCArtboard>
      </DCSection>

      <DCSection id="modern" title="✨ 모던 테마" subtitle="iOS 시스템 그레이(#f2f2f7) 기반 변형.">
        <DCArtboard id="m-s4-pick" label="s4 · 사진 선택 (modern)" width={PW} height={PH}>
          <S4Gallery selectedIdx={4} theme="modern" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
