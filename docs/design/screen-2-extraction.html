<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poby — Screen 2 · 가이드라인 추출</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{ color-scheme: light; }
  html,body{ margin:0; padding:0; background:#e6e4dc; font-family:'Pretendard',-apple-system,system-ui,sans-serif; color:#1a1a1c; }
  *{ box-sizing:border-box; }
  @keyframes pobySpin { to { transform: rotate(360deg); } }
  @keyframes pobyPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.0); transform: scale(1); }
    50% { box-shadow: 0 0 0 6px rgba(255,255,255,.10); transform: scale(1.03); }
  }
  .dc-card ::-webkit-scrollbar{ display: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hifi-screens.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, PW, PH, S2Loading, S2Success, S2Error } = window;

function App() {
  return (
    <DesignCanvas
      title="Poby — Screen 2 · 가이드라인 추출"
      subtitle="2단계에서 받은 사진에서 인물 실루엣을 추출하는 화면. 로딩 / 성공 / 실패 세 상태."
    >
      <DCSection id="s2" title="s2 · 가이드라인 추출">
        <DCArtboard id="s2-load" label="A · 추출 중 (로딩)" width={PW} height={PH}>
          <S2Loading />
        </DCArtboard>
        <DCArtboard id="s2-ok" label="B · 추출 성공" width={PW} height={PH}>
          <S2Success />
        </DCArtboard>
        <DCArtboard id="s2-err" label="C · 추출 실패" width={PW} height={PH}>
          <S2Error />
        </DCArtboard>
      </DCSection>

      <DCSection id="modern" title="✨ 모던 테마" subtitle="iOS 시스템 그레이(#f2f2f7) 기반 변형.">
        <DCArtboard id="m-s2-load" label="s2 · 추출 중 (modern)" width={PW} height={PH}>
          <S2Loading theme="modern" />
        </DCArtboard>
        <DCArtboard id="m-s2-ok" label="s2 · 추출 성공 (modern)" width={PW} height={PH}>
          <S2Success theme="modern" />
        </DCArtboard>
        <DCArtboard id="m-s2-err" label="s2 · 추출 실패 (modern)" width={PW} height={PH}>
          <S2Error theme="modern" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
